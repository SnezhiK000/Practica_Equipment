<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <link rel="icon" href="{% static 'icon.png' %}" type="image/png">
    <meta charset="UTF-8">
    <title>Создание заявки - Техник</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #e8f5e9 0%, #b2dfdb 100%); color: #263238; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #00695c; margin-top: 0; }
        .nav-bar { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-link { text-decoration: none; color: white; background: #26a69a; padding: 8px 15px; border-radius: 5px; font-weight: 600; font-size: 14px; }
        .nav-link:hover { background: #00897b; }
        .nav-link.danger { background: #ef5350; }
        .section { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #e0e0e0; }
        .section h3 { color: #004d40; font-size: 16px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #004d40; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #b0bec5; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
        textarea { height: 80px; resize: vertical; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        button { background: #26a69a; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; margin-top: 10px; }
        button:hover { background: #00897b; }
        .messages { color: #c62828; background: #ffebee; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .cancel-link { display: block; text-align: center; margin-top: 10px; color: #c62828; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <a href="{% url 'show_technician' %}" class="nav-link">Назад</a>
        <a href="{% url 'show_new_requests' %}" class="nav-link">Новые заявки</a>
        <a href="{% url 'logout_view' %}" class="nav-link danger">Выйти</a>
    </div>

    <h2>Создание новой заявки</h2>
    <p>Добро пожаловать, <strong>{{ user_name }}</strong></p>

    {% if messages %}
        <div class="messages">{% for message in messages %}{{ message }}{% endfor %}</div>
    {% endif %}
    <form method="POST">
        {% csrf_token %}

        <div class="section">
            <h3>Заказчик</h3>
            <div class="form-group">
                <label>Сотрудник *: </label>
                <select name="requester" required>
                    <option value="">-- Выберите сотрудника --</option>
                    {% for cust in customers %}
                        <option value="{{ cust.id }}">
                            {{ cust.last_name }} {{ cust.first_name }} {{ cust.middle_name }} (Кабинет {{ cust.office.number }})
                        </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="section">
            <h3>Оборудование и проблема</h3>
            <div class="form-group">
                <label>Оборудование *: </label>
                <select name="equipment" required>
                    <option value="">-- Выберите оборудование --</option>
                    {% for equip in equipment_list %}
                        <option value="{{ equip.inventory_number }}">
                            {{ equip.inventory_number }} - {{ equip.model.name }} ({{ equip.configuration }}) | Каб. {{ equip.assigned_office.number }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Описание проблемы *: </label>
                <textarea name="problem_description" required></textarea>
            </div>
        </div>

        <div class="section">
            <h3>Исполнение</h3>
            <div class="row">
                <div class="col form-group">
                    <label>Исполнитель: </label>
                    <select name="assigned_technician">
                        <option value="">-- Не назначен --</option>
                        {% for tech in technicians %}
                            <option value="{{ tech.id }}">{{ tech.last_name }} {{ tech.first_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col form-group">
                    <label>Статус: </label>
                    <select name="status">
                        {% for status in statuses %}
                            <option value="{{ status.id }}">{{ status.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Комментарий техника: </label>
                <textarea name="comment_technician"></textarea>
            </div>
        </div>

        <div class="section">
            <h3>Детали</h3>
            <div class="row">
                <div class="col form-group">
                    <label>Категория: </label>
                    <select name="category">
                        <option value="">-- Нет --</option>
                        {% for cat in categories %}<option value="{{ cat.id }}">{{ cat.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="col form-group">
                    <label>Приоритет: </label>
                    <select name="priority">
                        <option value="">-- Нет --</option>
                        {% for pri in priorities %}<option value="{{ pri.id }}">{{ pri.name }}</option>{% endfor %}
                    </select>
                </div>
                <div class="col form-group">
                    <label>Этап ремонта: </label>
                    <select name="repair_stage">
                        <option value="">-- Нет --</option>
                        {% for stage in stages %}<option value="{{ stage.id }}">{{ stage.name }}</option>{% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col form-group">
                    <label>Дата выполнения: </label>
                    <input type="datetime-local" name="completion_date" value="{{ now|date:'Y-m-d\TH:i' }}">
                </div>
            </div>
        </div>

        <button type="submit">Создать заявку</button>
        <a href="{% url 'show_technician' %}" class="cancel-link">Отмена</a>
    </form>
</div>
</body>
</html>
